<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Image Classifier</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 1px dashed #ccc; width: 90%; cursor: pointer; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 6px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 30px; padding: 20px; border-radius: 8px; background-color: #e9ecef; }
        .result p { font-size: 18px; margin: 10px 0; font-weight: 500; color: #444; }
        .highlight { color: #d9534f; font-weight: bold; font-size: 22px; text-transform: uppercase; }
        .confidence { color: #28a745; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 Upload an Image for AI Prediction</h2>
        
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <br>
            <button type="submit">Predict Image</button>
        </form>

        {% if prediction %}
            <div class="result">
                <p>AI Prediction: <span class="highlight">{{ prediction }}</span></p>
                <p>Confidence: <span class="confidence">{{ confidence }}%</span></p>
            </div>
        {% endif %}
    </div>

</body>
</html>
